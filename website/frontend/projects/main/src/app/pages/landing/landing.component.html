<div class="block">
  <h1 class="name">Denys Horman</h1>
  <h2 class="description">Software Engineer</h2>
  <div class="social">
    @for (contact of contacts; track contact.name) {
      @if (contact.enabled) {
        <a [href]="contact.value" target="_blank">
          <fa-icon [icon]="contact.icon" [title]="contact.name"></fa-icon>
        </a>
      }
    }
  </div>
</div>
