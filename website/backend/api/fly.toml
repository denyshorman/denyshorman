app = "denyshorman-website-api"

kill_signal = "SIGTERM"
kill_timeout = 120

[build]
  image = "ghcr.io/denyshorman/personal-website-api:latest"

[env]
  GRPC_SERVER_PORT = "50051"
  GRPC_WEB_PROXY_SERVER_PORT = "80"
  GRPC_WEB_PROXY_SERVER_PATH = "/app/proxy"

[deploy]
  strategy = "bluegreen"

[[services]]
  internal_port = 80
  protocol = "tcp"

  [services.concurrency]
    hard_limit = 4096
    soft_limit = 2048

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = "443"

  [[services.tcp_checks]]
    grace_period = "30s"
    interval = "30s"
    restart_limit = 2
    timeout = "60s"
